name: Build My MCP Server Docker Image

on:
  push:
    paths:
      - 'mcp/my-mcp-server/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version of the server (format x.y.z)'
        required: false
        default: 'latest'
env:
  version: ${{ case(github.event.inputs.version != '', github.event.inputs.version, 'latest') }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./mcp/my-mcp-server
          file: ./mcp/my-mcp-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/abox-my-mcp-server:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/abox-my-mcp-server:${{ github.event.inputs.version }}
            ghcr.io/${{ github.repository_owner }}/abox-my-mcp-server:${{ github.run_number }}
