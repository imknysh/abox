name: Build Basic Agent Docker Image

on:
  push:
    paths:
      - 'agents/basic/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version of the agent (format x.y.z)'
        required: false
        default: 'latest'
      base_image_version:
        description: 'Version of the base image kagent-adk (format x.y.z)'
        required: false
        default: '0.8.0-beta8'  
jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./agents/basic
          file: ./agents/basic/Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.event.inputs.base_image_version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/abox-basic-agent:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/abox-basic-agent:${{ github.event.inputs.version }}
            ghcr.io/${{ github.repository_owner }}/abox-basic-agent:${{ github.run_number }}
