apiVersion: v1
kind: Namespace
metadata:
  name: mcp-governance
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: mcp-governance
  namespace: mcp-governance
spec:
  interval: 1h
  url: oci://ghcr.io/techwithhuz/charts/mcp-governance
  ref:
    tag: "0.21.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-governance
  namespace: mcp-governance
spec:
  interval: 1h
  releaseName: mcp-governance
  chartRef:
    kind: OCIRepository
    name: mcp-governance
    namespace: mcp-governance
  install:
    createNamespace: true
  values:
    image:
      tag: "latest"